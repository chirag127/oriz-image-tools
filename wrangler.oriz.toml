# Recommended wrangler.toml for the oriz-family scaffold.
# The existing wrangler.toml uses pages_build_output_dir (Cloudflare Pages
# legacy mode). The oriz family is migrating to Workers Static Assets via
# `[assets]`. Once you switch the project on Cloudflare, replace the
# existing wrangler.toml with this one.

name = "oriz-image-tools"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
not_found_handling = "404-page"

# Custom domain bound via dashboard:
#   image.oriz.in -> oriz-image-tools
